<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flux — Config</title>
  <link rel="icon" href="assets/logo.svg">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/config.css">
</head>
<body>
  <div class="waves" aria-hidden="true">
    <svg viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
      <rect width="1280" height="720" fill="#281808"/>
      <path d="M0 300 C300 240 500 360 760 320 C1000 285 1120 230 1280 250 L1280 470 C1080 430 980 500 720 470 C420 435 260 520 0 470 Z" fill="#34230f" opacity="0.7"/>
      <path d="M0 540 C260 480 460 600 760 560 C1020 525 1140 470 1280 500 L1280 720 L0 720 Z" fill="#43301a" opacity="0.6"/>
    </svg>
  </div>

  <nav class="navbar">
    <img class="logo" src="assets/logo.svg" alt="Flux">
    <div class="nav-links">
      <a href="home.html">Home</a>
      <a href="kanban.html">My Kanban's</a>
      <a href="workflow.html">Work Flow</a>
    </div>
    <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </nav>

  <main class="page center-wrap">
    <section class="panel config-panel">

      <span class="pill-title config-pill">Perfil</span>
      <div class="profile">
        <div class="avatar-block">
          <div class="avatar"></div>
          <span class="avatar-label">Alterar Foto</span>
        </div>
        <div class="profile-info">
          <p><strong>Nome:</strong> <span id="p-name"></span></p>
          <p><strong>E-Mail:</strong> <span id="p-email"></span></p>
          <p><strong>Função:</strong> <span id="p-role"></span></p>
        </div>
      </div>

      <span class="pill-title config-pill aparencia-pill">Aparência</span>
      <div class="appearance">
        <div class="toggle-list">
          <label class="toggle-row">
            <span class="switch"><input type="checkbox" id="t-dark" checked><span class="slider"></span></span>
            <span>Ativar Dark Mode</span>
          </label>
          <label class="toggle-row">
            <span class="switch"><input type="checkbox" id="t-compact"><span class="slider"></span></span>
            <span>Ativar Cards Compactos</span>
          </label>
          <label class="toggle-row">
            <span class="switch"><input type="checkbox" id="t-anim" checked><span class="slider"></span></span>
            <span>Ativar Animações Fluidas</span>
          </label>
          <label class="toggle-row">
            <span class="switch"><input type="checkbox" id="t-waves"><span class="slider"></span></span>
            <span>Ocultar Ondas de Fundo</span>
          </label>
        </div>

        <div class="custom-color">
          <input type="color" id="accent-picker" value="#dd7517">
          <label class="toggle-row centered">
            <span class="switch"><input type="checkbox" id="t-custom"><span class="slider"></span></span>
            <span>Ativar Modo Personalizado</span>
          </label>
        </div>
      </div>

    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/config.js"></script>
</body>
</html>
